name: Upload to itch.io

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag the build with (e.g. 1.0.0)"
        required: false

env:
  GODOT_VERSION: "4.6"
  ITCH_GAME: "praytic/word-cannon"

jobs:
  export:
    name: Export ${{ matrix.preset }}
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: "Windows Desktop"
            output_dir: build/windows
            output_file: WordCannon.exe
            artifact: windows
          - preset: "Linux"
            output_dir: build/linux
            output_file: WordCannon.x86_64
            artifact: linux
          - preset: "macOS"
            output_dir: build/macos
            output_file: WordCannon.zip
            artifact: mac
          - preset: "Web"
            output_dir: build/web
            output_file: index.html
            artifact: web
          - preset: "Android"
            output_dir: build/android
            output_file: WordCannon.apk
            artifact: android
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ 2>/dev/null || true

      - name: Setup Android keystore
        if: matrix.artifact == 'android'
        run: |
          keytool -genkey -v -keystore /tmp/debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo 'export/android/android_sdk_path = "/usr/lib/android-sdk"' >> ~/.config/godot/editor_settings-4.tres
          echo 'export/android/debug_keystore = "/tmp/debug.keystore"' >> ~/.config/godot/editor_settings-4.tres
          echo 'export/android/debug_keystore_user = "androiddebugkey"' >> ~/.config/godot/editor_settings-4.tres
          echo 'export/android/debug_keystore_pass = "android"' >> ~/.config/godot/editor_settings-4.tres

      - name: Create output directory
        run: mkdir -p ${{ matrix.output_dir }}

      - name: Import project
        run: godot --headless --import 2>&1 || true

      - name: Export build
        run: godot --headless --export-release "${{ matrix.preset }}" ${{ matrix.output_dir }}/${{ matrix.output_file }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.output_dir }}
          retention-days: 1

  export-ios:
    name: Export iOS
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          brew install --cask godot
          GODOT_BIN=$(find /Applications -name "Godot*" -type f -perm +111 2>/dev/null | head -1)
          echo "GODOT_BIN=${GODOT_BIN}" >> $GITHUB_ENV

      - name: Download export templates
        run: |
          TEMPLATES_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          curl -L "$TEMPLATES_URL" -o /tmp/templates.tpz
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable
          unzip -o /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable/

      - name: Create output directory
        run: mkdir -p build/ios

      - name: Import project
        run: $GODOT_BIN --headless --import 2>&1 || true

      - name: Export iOS build
        run: $GODOT_BIN --headless --export-release "iOS" build/ios/WordCannon.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: build/ios
          retention-days: 1

  upload:
    name: Upload to itch.io
    runs-on: ubuntu-latest
    needs: [export, export-ios]
    if: always() && needs.export.result == 'success'
    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build

      - name: Install butler
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip -d butler-bin
          chmod +x butler-bin/butler
          echo "$PWD/butler-bin" >> $GITHUB_PATH

      - name: Push Windows build
        run: butler push build/windows ${{ env.ITCH_GAME }}:windows --userversion ${{ steps.version.outputs.version }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

      - name: Push Linux build
        run: butler push build/linux ${{ env.ITCH_GAME }}:linux --userversion ${{ steps.version.outputs.version }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

      - name: Push macOS build
        run: butler push build/mac ${{ env.ITCH_GAME }}:mac --userversion ${{ steps.version.outputs.version }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

      - name: Push Web build
        run: butler push build/web ${{ env.ITCH_GAME }}:web --userversion ${{ steps.version.outputs.version }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

      - name: Push Android build
        run: butler push build/android ${{ env.ITCH_GAME }}:android --userversion ${{ steps.version.outputs.version }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

      - name: Push iOS build
        if: needs.export-ios.result == 'success'
        run: butler push build/ios ${{ env.ITCH_GAME }}:ios --userversion ${{ steps.version.outputs.version }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
